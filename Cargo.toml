dirs = "5"
encoding_rs = "0.8"
env_logger = "0.11"
futures-util = "0.3"
futures = "0.3"
futures-concurrency = "7.7.1"
fs2 = "0.4"
gpui = { path = "crates/gpui-ce/gpui", version = "=0.2.2" }
gpui_linux = { path = "crates/gpui-ce/gpui_linux", version = "0.1.0" }
gpui_macos = { path = "crates/gpui-ce/gpui_macos", version = "0.1.0" }
