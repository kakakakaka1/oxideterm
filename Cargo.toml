[workspace]
members = [
  "crates/oxideterm-gpui-markdown",
  "crates/oxideterm-gpui-terminal",
  "crates/oxideterm-code-editor",
  "crates/oxideterm-i18n",
  "crates/oxideterm-native",
  "crates/oxideterm-render-policy",
  "crates/oxideterm-settings",
  "crates/oxideterm-ssh",
  "crates/oxideterm-terminal",
  "crates/oxideterm-terminal-encoding",
  "crates/oxideterm-terminal-graphics",
  "crates/oxideterm-terminal-unicode",
  "crates/oxideterm-theme",
  "crates/oxideterm-webview",
  "crates/oxideterm-workspace",
  "crates/russh",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "GPL-3.0-only"
version = "0.1.0"

[workspace.dependencies]
alacritty_terminal = "0.26.0"
anyhow = "1.0"
base64 = "0.22"
crossbeam-channel = "0.5"
dashmap = "6.1"
encoding_rs = "0.8"
gpui = "=0.2.2"
gpui-component = { version = "=0.5.1", default-features = false }
icy_sixel = "0.5.0"
image = "0.25.10"
libc = "0.2"
parking_lot = "0.12"
polling = "3.11"
raw-window-handle = "0.6"
regex = "1.12"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
signature = "2"
ssh-encoding = "0.2"
thiserror = "2.0"
tokio = { version = "1.52", features = ["rt-multi-thread", "sync", "time", "io-util", "net"] }
tracing = "0.1"
unicode-bidi = "0.3"
unicode-segmentation = "1.12"
uuid = { version = "1.23", features = ["v4", "serde"] }
windows = "0.61"
zeroize = { version = "1.8", features = ["serde"] }

[profile.release]
lto = "thin"
codegen-units = 1
strip = true
panic = "abort"
opt-level = 3

[profile.dev]
opt-level = 0
debug = 1
incremental = true
split-debuginfo = "unpacked"
