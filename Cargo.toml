default-members = ["crates/oxideterm-gpui-app"]
resolver = "2"

[patch.crates-io]
gpui = { path = "crates/gpui-ce/gpui" }
russh = { path = "crates/russh" }
russh-sftp = { path = "crates/russh-sftp" }

[workspace.package]
edition = "2024"
license = "GPL-3.0-only"
publish = false
version = "2.0.11"

[workspace.dependencies]
accesskit = "0.24.0"
accesskit_macos = "0.26.0"
accesskit_unix = "0.22.0"
