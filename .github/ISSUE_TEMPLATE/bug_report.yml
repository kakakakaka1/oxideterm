name: Bug Report
description: Something is broken or behaves incorrectly / 功能异常或行为不符合预期
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        **Not for security issues** — use [Report a vulnerability](https://github.com/AnalyseDeCircuit/OxideTerm/security/advisories/new) instead.
        **安全漏洞** — 请用 GitHub 私密漏洞报告，勿用本模板。

        **One bug per issue.** Please do not combine multiple unrelated bugs — open separate issues instead.
        **每个 Issue 只报一个 bug。** 请勿将多个不相关的问题合并提交，请分别创建 Issue。

        **Not sure if it's a bug?** If you're asking "how do I …?" or unsure whether the behavior is expected, please check the [documentation](https://github.com/AnalyseDeCircuit/OxideTerm/tree/main/docs/reference) or ask in [Discussions Q&A](https://github.com/AnalyseDeCircuit/oxideterm/discussions/categories/q-a) first.
        **不确定是否为 bug？** 如果你的问题是「怎么用」或不确定当前行为是否符合预期，请先查阅[文档](https://github.com/AnalyseDeCircuit/OxideTerm/tree/main/docs/reference)或到 [Discussions Q&A](https://github.com/AnalyseDeCircuit/oxideterm/discussions/categories/q-a) 提问。

  - type: input
    id: version
    attributes:
      label: OxideTerm version / 版本
      description: e.g. `0.20.1` (from About or title bar)
      placeholder: "0.20.1"
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform / 平台
      options:
        - macOS
        - Windows
        - Linux
        - Other
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area / 问题领域
      options:
        - SSH / authentication / compatibility
        - Terminal / local terminal / serial
        - SFTP / file manager
        - IDE mode / remote agent
        - Port forwarding / reconnect / ProxyJump
        - AI / OxideSens / MCP / RAG
        - Plugins
        - Import / export / connection migration
        - Install / update / portable mode
        - UI / settings / themes
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary / 简述
      description: What went wrong in one or two sentences?
      placeholder: When I …, I expected … but …
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce / 复现步骤
      description: Numbered steps so someone else can follow them.
      placeholder: |
        1. Open …
        2. Connect to …
        3. Click …
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual / 预期与实际
      placeholder: |
        - Expected: …
        - Actual: …
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots / 日志或截图
      description: |
        Paste relevant log output or attach screenshots. Redact hostnames, IPs, and secrets.
        请粘贴相关日志或附上截图。请隐去主机名、IP、密钥。
        Tip: Settings → Help & About → Diagnostics → Open Log Directory
        提示：设置 → 帮助与关于 → 诊断 → 打开日志目录
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Additional environment details / 其他相关环境信息
      description: |
        Optional. Add only details that are relevant to this bug, such as remote server OS, SSH server version, shell, WSL, GPU/WebGL, or terminal renderer.
        可选。只填写与本 bug 相关的信息，例如远程服务器系统、SSH 服务端版本、shell、WSL、GPU/WebGL 或终端渲染器。
      placeholder: |
        - Remote: Ubuntu 22.04, OpenSSH 9.6
        - Shell: zsh / bash / PowerShell
        - Context: WSL / GPU rendering / external terminal
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I tested with the latest release, can still reproduce the issue, and searched existing issues / 我已使用最新正式版测试，问题仍然存在，并已搜索过已有 Issue
          required: true
        - label: This is one reproducible bug, not a usage question or feature request / 这是一个可复现的 bug，而不是使用问题或功能建议
          required: true
        - label: |
            I provided the OxideTerm version, platform, and steps to reproduce; I understand vague, incomplete, or inactive issues may be closed.
            我已提供 OxideTerm 版本、平台及复现步骤；我理解描述模糊、信息不足或长期无回复的 Issue 可能会被关闭。
          required: true
