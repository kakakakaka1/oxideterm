name: Issue Stable Version Reminder

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  remind:
    name: Check reported stable version
    if: ${{ !endsWith(github.actor, '[bot]') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out version policy
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Test version policy
        run: node --test scripts/quality/tests/issue_version_policy.test.cjs

      - name: Compare with the latest stable release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const policy = require('./scripts/quality/issue_version_policy.cjs');

            const issue = context.payload.issue;
            const repository = {
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
            };
            const releases = await github.paginate(github.rest.repos.listReleases, {
              owner: repository.owner,
              repo: repository.repo,
              per_page: 100,
            });
            const outdated = policy.findOutdatedStableVersion(issue.body || '', releases);
            if (!outdated) {
              core.info('No outdated stable version was reported.');
              return;
            }

            // A stable marker keeps manual workflow retries from posting duplicates.
            const comments = await github.paginate(github.rest.issues.listComments, {
              ...repository,
              per_page: 100,
            });
            if (policy.hasVersionReminder(comments)) {
              core.info('The stable version reminder already exists.');
              return;
            }

            await github.rest.issues.createComment({
              ...repository,
              body: policy.buildVersionReminder(outdated),
            });
