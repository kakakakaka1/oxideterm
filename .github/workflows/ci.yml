name: CI

on:
  push:
    branches: [main]
    paths:
      - 'agent/**'
      - 'crates/**'
      - 'scripts/audit_i18n.py'
      - 'scripts/build-agent.sh'
      - 'scripts/package_native.py'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/ci.yml'
      - '.github/workflows/native-package.yml'
  pull_request:
    branches: [main]

permissions:
  contents: read

# Match the Tauri CI behavior: newer commits replace stale checks for the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: Rust workspace (check + fmt + test)
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: false

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          # GitHub's Ubuntu 22.04 image can preinstall LLVM libunwind-*-dev
          # packages. They conflict with libunwind-dev, which GStreamer dev
          # packages require, so remove the LLVM dev variants before apt solves.
          sudo apt-get remove -y \
            libunwind-14-dev \
            libunwind-15-dev \
            libunwind-16-dev \
            libunwind-17-dev \
            libunwind-18-dev || true
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libunwind-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            mesa-vulkan-drivers \
            pkg-config

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo test
        run: cargo test --workspace

  agent:
    name: Remote agent (check + fmt + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: ./agent -> target
          cache-on-failure: false

      - name: cargo check
        run: cargo check --manifest-path agent/Cargo.toml

      - name: cargo fmt
        run: cargo fmt --manifest-path agent/Cargo.toml --check

      - name: cargo test
        run: cargo test --manifest-path agent/Cargo.toml

      # CI builds the same bundled Linux agent binaries that release packages ship.
      - name: Build bundled remote agents
        run: ./scripts/build-agent.sh

  i18n:
    name: i18n completeness
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Audit native locale catalogs
        run: python scripts/audit_i18n.py

  cargo-deny:
    name: License & dependency audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: cargo deny (workspace)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml
          command: check
          command-arguments: licenses bans

      - name: cargo deny (agent)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: agent/Cargo.toml
          command: check
          command-arguments: --config agent/deny.toml licenses bans
