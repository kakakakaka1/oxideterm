name: Native Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional artifact version override, for example 0.1.0-preview.1'
        required: false
        type: string
      upload_release:
        description: 'Upload artifacts to the current tag release'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'
      - 'native-v*'
      - 'gpui-v*'

permissions:
  contents: read

concurrency:
  group: native-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Six-platform matrix (macOS / Linux / Windows, arm64 + x64) ─────────
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - label: macos-x64
            # Use an Intel runner so Cargo build scripts run on the same host
            # architecture as the x86_64 release target.
            os: macos-15-intel
            target: x86_64-apple-darwin
          - label: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - label: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate manual release input
        if: github.event_name == 'workflow_dispatch' && inputs.upload_release && inputs.version == ''
        run: python3 -c "import sys; print('Manual release upload requires the version input.', file=sys.stderr); sys.exit(1)"

      - name: Install Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: 1.94.1
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          key: native-package-${{ matrix.target }}
          cache-on-failure: false

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-deps
        with:
          extra_packages: 'curl file patchelf desktop-file-utils dpkg-dev rpm freerdp2-dev'

      - name: Install Linux AppImage tooling
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu)
              appimage_arch="x86_64"
              appimage_sha256="b90f4a8b18967545fda78a445b27680a1642f1ef9488ced28b65398f2be7add2"
              ;;
            aarch64-unknown-linux-gnu)
              appimage_arch="aarch64"
              appimage_sha256="a48972e5ae91c944c5a7c80214e7e0a42dd6aa3ae979d8756203512a74ff574d"
              ;;
            *) echo "Unsupported AppImage target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          curl -L --retry 3 \
            -o appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${appimage_arch}.AppImage"
          echo "${appimage_sha256}  appimagetool" | sha256sum --check --strict
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          NSIS_VERSION: '3.12'
          NSIS_ARCHIVE_SHA256: '56581f90db321581c5381193d796fffcf2d24b2f8fed2160a6c6a3baa67f2c4f'
        run: |
          # Download the official portable archive without relying on Chocolatey's OData feed.
          $archiveName = "nsis-$env:NSIS_VERSION.zip"
          $archivePath = Join-Path $env:RUNNER_TEMP $archiveName
          $downloadUrl = "https://downloads.sourceforge.net/project/nsis/NSIS%203/$env:NSIS_VERSION/$archiveName"
          curl.exe --fail --location --retry 3 --retry-all-errors `
            --output $archivePath $downloadUrl

          $archiveHash = (Get-FileHash -Algorithm SHA256 -Path $archivePath).Hash.ToLowerInvariant()
          if ($archiveHash -ne $env:NSIS_ARCHIVE_SHA256) {
            throw "NSIS archive checksum mismatch: $archiveHash"
          }

          $extractRoot = Join-Path $env:RUNNER_TEMP "nsis-$env:NSIS_VERSION-portable"
          Expand-Archive -Path $archivePath -DestinationPath $extractRoot -Force
          $nsisBin = Join-Path $extractRoot "nsis-$env:NSIS_VERSION"
          if (-not (Test-Path (Join-Path $nsisBin 'makensis.exe'))) {
            throw 'makensis.exe is missing from the verified NSIS archive.'
          }
          $nsisBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

          # GitHub-hosted Windows runners include 7-Zip; avoid a redundant feed request.
          if (-not (Get-Command 7z -ErrorAction SilentlyContinue)) {
            throw '7-Zip is missing from the GitHub-hosted Windows runner.'
          }

      - name: Import Windows signing certificate
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WINDOWS_SIGN_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_SIGN_CERTIFICATE_BASE64 }}
          WINDOWS_SIGN_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_SIGN_CERTIFICATE_PASSWORD }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:WINDOWS_SIGN_CERTIFICATE_BASE64)) {
            Write-Host 'Windows signing certificate is not configured; producing an unsigned development artifact.'
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP 'oxideterm-signing.pfx'
          [IO.File]::WriteAllBytes(
            $certificatePath,
            [Convert]::FromBase64String($env:WINDOWS_SIGN_CERTIFICATE_BASE64)
          )
          $password = ConvertTo-SecureString $env:WINDOWS_SIGN_CERTIFICATE_PASSWORD -AsPlainText -Force
          $certificate = Import-PfxCertificate `
            -FilePath $certificatePath `
            -CertStoreLocation Cert:\CurrentUser\My `
            -Password $password
          Remove-Item $certificatePath -Force
          "WINDOWS_SIGN_CERT_SHA1=$($certificate.Thumbprint)" | Out-File `
            -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Import macOS signing certificate
        if: runner.os == 'macOS'
        shell: bash
        env:
          MACOS_SIGN_CERTIFICATE_BASE64: ${{ secrets.MACOS_SIGN_CERTIFICATE_BASE64 }}
          MACOS_SIGN_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGN_CERTIFICATE_PASSWORD }}
          MACOS_NOTARY_KEY_BASE64: ${{ secrets.MACOS_NOTARY_KEY_BASE64 }}
          MACOS_NOTARY_KEY_ID: ${{ secrets.MACOS_NOTARY_KEY_ID }}
          MACOS_NOTARY_ISSUER_ID: ${{ secrets.MACOS_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          if [[ -z "${MACOS_SIGN_CERTIFICATE_BASE64:-}" ]]; then
            echo 'macOS signing certificate is not configured; using ad-hoc signing.'
            exit 0
          fi

          keychain_path="${RUNNER_TEMP}/oxideterm-signing.keychain-db"
          keychain_password="$(uuidgen)$(uuidgen)"
          certificate_path="${RUNNER_TEMP}/oxideterm-signing.p12"
          identity_path="${RUNNER_TEMP}/oxideterm-signing.pem"
          printf '%s' "${MACOS_SIGN_CERTIFICATE_BASE64}" | openssl base64 -d -A > "${certificate_path}"
          chmod 600 "${certificate_path}"
          security create-keychain -p "${keychain_password}" "${keychain_path}"
          security set-keychain-settings -lut 21600 "${keychain_path}"
          security unlock-keychain -p "${keychain_password}" "${keychain_path}"
          openssl pkcs12 \
            -in "${certificate_path}" \
            -passin env:MACOS_SIGN_CERTIFICATE_PASSWORD \
            -nodes \
            -out "${identity_path}"
          chmod 600 "${identity_path}"
          security import "${identity_path}" \
            -k "${keychain_path}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "${keychain_path}"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "${keychain_password}" \
            "${keychain_path}"
          signing_identity="$(security find-identity -v -p codesigning "${keychain_path}" | awk 'NR == 1 { print $2 }')"
          if [[ -z "${signing_identity}" ]]; then
            echo 'Imported macOS certificate did not expose a code-signing identity.' >&2
            exit 1
          fi
          echo "MACOS_CODESIGN_IDENTITY=${signing_identity}" >> "${GITHUB_ENV}"
          echo "MACOS_SIGNING_KEYCHAIN=${keychain_path}" >> "${GITHUB_ENV}"

          if [[ -n "${MACOS_NOTARY_KEY_BASE64:-}" ]]; then
            if [[ -z "${MACOS_NOTARY_KEY_ID:-}" || -z "${MACOS_NOTARY_ISSUER_ID:-}" ]]; then
              echo 'macOS notarization key requires key id and issuer id.' >&2
              exit 1
            fi
            notary_key_path="${RUNNER_TEMP}/AuthKey_${MACOS_NOTARY_KEY_ID}.p8"
            printf '%s' "${MACOS_NOTARY_KEY_BASE64}" | openssl base64 -d -A > "${notary_key_path}"
            chmod 600 "${notary_key_path}"
            echo "MACOS_NOTARY_KEY_PATH=${notary_key_path}" >> "${GITHUB_ENV}"
            echo "MACOS_NOTARY_KEY_ID=${MACOS_NOTARY_KEY_ID}" >> "${GITHUB_ENV}"
            echo "MACOS_NOTARY_ISSUER_ID=${MACOS_NOTARY_ISSUER_ID}" >> "${GITHUB_ENV}"
          fi

          rm -f "${certificate_path}" "${identity_path}"

      - name: Resolve effective package version
        id: package_version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            raw_version="${GITHUB_REF_NAME}"
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            raw_version="${INPUT_VERSION}"
          else
            raw_version="$(python3 -c 'import tomllib; print(tomllib.load(open("Cargo.toml", "rb"))["workspace"]["package"]["version"])')"
          fi
          echo "raw=${raw_version}" >> "${GITHUB_OUTPUT}"

      - name: Package native app
        env:
          OXIDETERM_VERSION: ${{ steps.package_version.outputs.raw }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ runner.os == 'Linux' && '1' || '' }}
        run: python scripts/package_native.py ${{ matrix.target }}

      - name: Remove temporary signing material
        if: always()
        shell: bash
        run: |
          rm -f "${RUNNER_TEMP}"/AuthKey_*.p8
          if [[ "${RUNNER_OS}" == 'macOS' && -n "${MACOS_SIGNING_KEYCHAIN:-}" ]]; then
            security delete-keychain "${MACOS_SIGNING_KEYCHAIN}" || true
          fi

      - name: Verify native package contents
        run: >-
          python scripts/verify_native_package.py
          --target ${{ matrix.target }}
          --version ${{ steps.package_version.outputs.raw }}
          --dist dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: OxideTerm-${{ matrix.label }}
          path: |
            dist/*.app.zip
            dist/*.dmg
            dist/*.tar.gz
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
      prerelease: ${{ steps.release_meta.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download package artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          pattern: OxideTerm-*
          path: dist-release
          merge-multiple: true

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="native-v${INPUT_VERSION}"
          fi

          version="${tag#native-v}"
          version="${version#gpui-v}"
          version="${version#v}"

          prerelease=false
          if [[ "${tag}" == native-v* || "${tag}" == gpui-v* || "${version}" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release notes
        id: release_notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail

          notes_channel="stable"
          notes_base=".github/release-notes/stable.md"
          notes_changelog=".github/release-notes/stable-changelog.md"

          if [[ "${RELEASE_TAG}" == gpui-v* || "${RELEASE_VERSION}" == *gpui-preview* || "${RELEASE_VERSION}" == *native-preview* || "${RELEASE_VERSION}" == *rustnative-preview* ]]; then
            notes_channel="gpui-preview"
            notes_base=".github/release-notes/gpui-preview.md"
            notes_changelog=".github/release-notes/gpui-preview-changelog.md"
          elif [[ "${RELEASE_TAG}" == beta-v* || "${RELEASE_TAG}" == native-beta-v* || "${RELEASE_VERSION}" == *beta* ]]; then
            notes_channel="beta"
            notes_base=".github/release-notes/beta.md"
            notes_changelog=".github/release-notes/beta-changelog.md"
          fi

          # Every channel combines channel evergreen text with a single
          # versioned changelog section so release history can stay in Git.
          python3 .github/scripts/compose_release_notes.py \
            --version "${RELEASE_VERSION}" \
            --tag "${RELEASE_TAG}" \
            --base "${notes_base}" \
            --changelog "${notes_changelog}" \
            --output release-notes.md

          echo "channel=${notes_channel}" >> "${GITHUB_OUTPUT}"
          echo "generate_release_notes=false" >> "${GITHUB_OUTPUT}"
          echo "body_path=release-notes.md" >> "${GITHUB_OUTPUT}"

      - name: Sign release assets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y minisign

          key_path="$(mktemp)"
          trap 'rm -f "${key_path}"' EXIT
          printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | base64 --decode > "${key_path}"
          chmod 600 "${key_path}"

          # Native and Tauri channel updaters both reject unsigned assets.
          mapfile -t assets < <(find dist-release -maxdepth 1 -type f \( \
            -name '*.app.zip' -o \
            -name '*.dmg' -o \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' \
          \) | sort -u)

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No native release assets found to sign." >&2
            exit 1
          fi

          for asset in "${assets[@]}"; do
            sig="${asset}.sig"
            trusted_comment="OxideTerm ${VERSION} $(basename "${asset}")"
            if [[ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]]; then
              printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" \
                | minisign -S -s "${key_path}" -m "${asset}" -x "${sig}" -t "${trusted_comment}"
            else
              minisign -S -W -s "${key_path}" -m "${asset}" -x "${sig}" -t "${trusted_comment}"
            fi
          done

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t checksum_assets < <(find dist-release -maxdepth 1 -type f \( \
            -name '*.app.zip' -o \
            -name '*.dmg' -o \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.rpm' \
          \) | sort -u)

          if [[ "${#checksum_assets[@]}" -eq 0 ]]; then
            echo "No native release assets found for checksum generation." >&2
            exit 1
          fi

          (cd dist-release && sha256sum "${checksum_assets[@]/#dist-release\//}" > sha256sums.txt)

      - name: Upload release assets
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: |
            dist-release/*.app.zip
            dist-release/*.dmg
            dist-release/*.tar.gz
            dist-release/*.zip
            dist-release/*.exe
            dist-release/*.AppImage
            dist-release/*.deb
            dist-release/*.rpm
            dist-release/*.sig
            dist-release/sha256sums.txt
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: OxideTerm Native ${{ steps.release_meta.outputs.version }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          # Stable releases are promoted explicitly after canary validation.
          # This prevents a tag push from immediately reaching every 1.x client.
          make_latest: false
          body_path: ${{ steps.release_notes.outputs.body_path }}
          generate_release_notes: ${{ steps.release_notes.outputs.generate_release_notes }}

  publish-updater:
    name: Generate updater manifest
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;
            const isStable = tag.startsWith('v') && !version.includes('-');

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const assets = new Map(release.assets.map((asset) => [asset.name, asset]));
            const platforms = {};

            async function addAsset(keys, assetName) {
              const binaryAsset = assets.get(assetName);
              const sigAsset = assets.get(`${assetName}.sig`);
              if (!binaryAsset || !sigAsset) {
                throw new Error(`Cannot build updater manifest: ${assetName} or its signature is missing`);
              }

              const sigResponse = await fetch(sigAsset.browser_download_url);
              if (!sigResponse.ok) {
                throw new Error(`failed to download ${sigAsset.name}: HTTP ${sigResponse.status}`);
              }

              // The updater manifest stores base64-encoded minisign text, matching
              // Tauri's update_manager.rs and the native oxideterm-update crate.
              const signatureText = (await sigResponse.text()).trim();
              const signature = Buffer.from(signatureText, 'utf8').toString('base64');
              for (const key of keys) {
                platforms[key] = {
                  signature,
                  url: binaryAsset.browser_download_url,
                };
              }
            }

            await addAsset(
              isStable
                ? ['darwin-aarch64-app', 'macos-aarch64', 'aarch64-apple-darwin']
                : ['darwin-aarch64', 'darwin-aarch64-app', 'macos-aarch64', 'aarch64-apple-darwin'],
              `OxideTerm_${version}_macos_arm64.app.zip`,
            );
            if (isStable) {
              await addAsset(
                ['darwin-aarch64'],
                `OxideTerm_${version}_macos_arm64.app.tar.gz`,
              );
            }
            await addAsset(
              ['darwin-aarch64-portable', 'macos-aarch64-portable', 'aarch64-apple-darwin-portable'],
              `OxideTerm_${version}_macos_arm64_portable.tar.gz`,
            );
            await addAsset(
              isStable
                ? ['darwin-x86_64-app', 'macos-x86_64', 'x86_64-apple-darwin']
                : ['darwin-x86_64', 'darwin-x86_64-app', 'macos-x86_64', 'x86_64-apple-darwin'],
              `OxideTerm_${version}_macos_x64.app.zip`,
            );
            if (isStable) {
              await addAsset(
                ['darwin-x86_64'],
                `OxideTerm_${version}_macos_x64.app.tar.gz`,
              );
            }
            await addAsset(
              ['darwin-x86_64-portable', 'macos-x86_64-portable', 'x86_64-apple-darwin-portable'],
              `OxideTerm_${version}_macos_x64_portable.tar.gz`,
            );
            await addAsset(
              ['linux-aarch64', 'linux-aarch64-appimage', 'aarch64-unknown-linux-gnu'],
              `OxideTerm_${version}_linux_arm64.AppImage`,
            );
            await addAsset(
              ['linux-x86_64', 'linux-x86_64-appimage', 'x86_64-unknown-linux-gnu'],
              `OxideTerm_${version}_linux_x64.AppImage`,
            );
            await addAsset(
              ['linux-aarch64-portable'],
              `OxideTerm_${version}_linux_arm64_portable.tar.gz`,
            );
            await addAsset(
              ['linux-x86_64-portable'],
              `OxideTerm_${version}_linux_x64_portable.tar.gz`,
            );
            await addAsset(
              ['linux-aarch64-deb'],
              `OxideTerm_${version}_linux_arm64.deb`,
            );
            await addAsset(
              ['linux-x86_64-deb'],
              `OxideTerm_${version}_linux_x64.deb`,
            );
            await addAsset(
              ['linux-aarch64-rpm'],
              `OxideTerm_${version}_linux_arm64.rpm`,
            );
            await addAsset(
              ['linux-x86_64-rpm'],
              `OxideTerm_${version}_linux_x64.rpm`,
            );
            await addAsset(
              ['windows-aarch64', 'windows-aarch64-nsis', 'aarch64-pc-windows-msvc', 'aarch64-pc-windows-msvc-nsis'],
              `OxideTerm_${version}_windows_arm64-setup.exe`,
            );
            await addAsset(
              ['windows-aarch64-portable'],
              `OxideTerm_${version}_windows_arm64_portable.zip`,
            );
            await addAsset(
              ['windows-x86_64', 'windows-x86_64-nsis', 'x86_64-pc-windows-msvc', 'x86_64-pc-windows-msvc-nsis'],
              `OxideTerm_${version}_windows_x64-setup.exe`,
            );
            await addAsset(
              ['windows-x86_64-portable'],
              `OxideTerm_${version}_windows_x64_portable.zip`,
            );

            if (Object.keys(platforms).length === 0) {
              throw new Error('latest.json would contain no updater platforms');
            }

            const latestJson = {
              version,
              notes: release.body || '',
              pub_date: release.published_at || new Date().toISOString(),
              platforms,
            };

            const existing = release.assets.find((asset) => asset.name === 'latest.json');
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            const content = JSON.stringify(latestJson, null, 2);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            core.info(`Uploaded latest.json for ${tag} with ${Object.keys(platforms).length} platform key(s).`);

  publish-gpui-preview-updater:
    name: Publish GPUI preview updater manifest
    needs:
      - release
      - publish-updater
    runs-on: ubuntu-latest
    if: needs.release.outputs.prerelease == 'true' && (startsWith(needs.release.outputs.tag, 'gpui-v') || contains(needs.release.outputs.version, 'gpui-preview') || contains(needs.release.outputs.version, 'native-preview') || contains(needs.release.outputs.version, 'rustnative-preview'))
    permissions:
      contents: write
    steps:
      - name: Upload latest.json to updater-gpui-preview release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        with:
          script: |
            const sourceTag = process.env.RELEASE_TAG;
            const channelTag = 'updater-gpui-preview';

            const { data: sourceRelease } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: sourceTag,
            });

            const latestAsset = sourceRelease.assets.find((asset) => asset.name === 'latest.json');
            if (!latestAsset) {
              throw new Error(`No latest.json found on ${sourceTag}`);
            }

            const manifestResponse = await fetch(latestAsset.browser_download_url);
            if (!manifestResponse.ok) {
              throw new Error(`failed to download latest.json: HTTP ${manifestResponse.status}`);
            }
            const content = await manifestResponse.text();

            let channelRelease;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: channelTag,
              });
              channelRelease = data;
            } catch (error) {
              if (error.status !== 404) throw error;
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: channelTag,
                name: 'GPUI Preview Updater Manifest',
                body: 'This release hosts latest.json for the GPUI preview update channel. Do not delete.',
                prerelease: true,
                draft: false,
              });
              channelRelease = data;
            }

            const existing = channelRelease.assets.find((asset) => asset.name === 'latest.json');
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: channelRelease.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            core.info(`Uploaded ${sourceTag} latest.json to ${channelTag}.`);

  cleanup-sigs:
    name: Remove signature helper assets
    needs:
      - release
      - publish-updater
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    steps:
      - name: Delete .sig assets from release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            const sigAssets = release.assets.filter((asset) => asset.name.endsWith('.sig'));
            for (const asset of sigAssets) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
            core.info(`Deleted ${sigAssets.length} signature helper asset(s).`);

  validate-release-assets:
    name: Validate release assets
    needs:
      - release
      - publish-updater
      - cleanup-sigs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: read
    steps:
      - name: Check final release asset set
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const names = new Set(release.assets.map((asset) => asset.name));
            const isGpuiPreview = tag.startsWith('gpui-v')
              || version.includes('gpui-preview')
              || version.includes('native-preview')
              || version.includes('rustnative-preview');
            if (isGpuiPreview && !(release.body || '').includes('do not download this preview yet')) {
              throw new Error(`Release ${tag} is missing the GPUI preview release-note warning`);
            }

            const expected = [
              'latest.json',
              'sha256sums.txt',
              `OxideTerm_${version}_macos_arm64.app.zip`,
              `OxideTerm_${version}_macos_arm64.dmg`,
              `OxideTerm_${version}_macos_arm64_portable.tar.gz`,
              `OxideTerm_${version}_macos_x64.app.zip`,
              `OxideTerm_${version}_macos_x64.dmg`,
              `OxideTerm_${version}_macos_x64_portable.tar.gz`,
              `OxideTerm_${version}_linux_arm64.AppImage`,
              `OxideTerm_${version}_linux_arm64.deb`,
              `OxideTerm_${version}_linux_arm64.rpm`,
              `OxideTerm_${version}_linux_arm64_portable.tar.gz`,
              `OxideTerm_${version}_linux_x64.AppImage`,
              `OxideTerm_${version}_linux_x64.deb`,
              `OxideTerm_${version}_linux_x64.rpm`,
              `OxideTerm_${version}_linux_x64_portable.tar.gz`,
              `OxideTerm_${version}_windows_arm64-setup.exe`,
              `OxideTerm_${version}_windows_arm64_portable.zip`,
              `OxideTerm_${version}_windows_x64-setup.exe`,
              `OxideTerm_${version}_windows_x64_portable.zip`,
            ];
            if (!isGpuiPreview && !version.includes('-')) {
              expected.push(
                `OxideTerm_${version}_macos_arm64.app.tar.gz`,
                `OxideTerm_${version}_macos_x64.app.tar.gz`,
              );
            }

            const missing = expected.filter((name) => !names.has(name));
            if (missing.length > 0) {
              throw new Error(`Release ${tag} is missing asset(s): ${missing.join(', ')}`);
            }

            const leakedSigs = [...names].filter((name) => name.endsWith('.sig'));
            if (leakedSigs.length > 0) {
              throw new Error(`Release ${tag} still exposes signature helper asset(s): ${leakedSigs.join(', ')}`);
            }

            const checksumAsset = release.assets.find((asset) => asset.name === 'sha256sums.txt');
            const response = await fetch(checksumAsset.browser_download_url);
            if (!response.ok) {
              throw new Error(`failed to download sha256sums.txt: HTTP ${response.status}`);
            }
            const checksumText = await response.text();
            const checksumMissing = expected
              .filter((name) => name !== 'latest.json' && name !== 'sha256sums.txt')
              .filter((name) => !checksumText.includes(`  ${name}`));
            if (checksumMissing.length > 0) {
              throw new Error(`sha256sums.txt is missing asset checksum(s): ${checksumMissing.join(', ')}`);
            }

            core.info(`Validated ${expected.length} release asset(s) for ${tag}.`);
