name: Native Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional artifact version override, for example 0.1.0-preview.1'
        required: false
        type: string
      upload_release:
        description: 'Upload artifacts to the current tag release'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'
      - 'native-v*'
      - 'gpui-v*'

permissions:
  contents: read

concurrency:
  group: native-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    name: Preflight checks
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
          targets: x86_64-unknown-linux-musl,aarch64-unknown-linux-musl

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          cache-on-failure: false

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          # GitHub's Ubuntu 22.04 image can preinstall LLVM libunwind-*-dev
          # packages. They conflict with libunwind-dev, which GStreamer dev
          # packages require, so remove the LLVM dev variants before apt solves.
          sudo apt-get remove -y \
            libunwind-14-dev \
            libunwind-15-dev \
            libunwind-16-dev \
            libunwind-17-dev \
            libunwind-18-dev || true
          sudo apt-get install -y \
            build-essential \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libunwind-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            mesa-vulkan-drivers \
            pkg-config

      # Keep release packaging gated on the same native checks as PR/main CI.
      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo fmt
        run: cargo fmt --check

      - name: cargo test
        run: cargo test --workspace

      - name: Remote agent check
        run: cargo check --manifest-path agent/Cargo.toml

      - name: Remote agent fmt
        run: cargo fmt --manifest-path agent/Cargo.toml --check

      - name: Remote agent test
        run: cargo test --manifest-path agent/Cargo.toml

      - name: Build bundled remote agents
        run: ./scripts/build-agent.sh

      - name: Upload bundled remote agents
        uses: actions/upload-artifact@v4
        with:
          name: bundled-remote-agents
          path: crates/oxideterm-gpui-app/resources/agents/oxideterm-agent-*
          if-no-files-found: error

      - name: Audit native locale catalogs
        run: python scripts/audit_i18n.py

      - name: cargo deny (workspace)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: Cargo.toml
          command: check
          command-arguments: licenses bans

      - name: cargo deny (agent)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: agent/Cargo.toml
          command: check
          command-arguments: --config agent/deny.toml licenses bans

  package:
    name: Package ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - label: macos-x64
            os: macos-13
            target: x86_64-apple-darwin
          - label: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - label: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: native-package-${{ matrix.target }}
          cache-on-failure: false

      - name: Download bundled remote agents
        uses: actions/download-artifact@v4
        with:
          name: bundled-remote-agents
          path: crates/oxideterm-gpui-app/resources/agents

      - name: Restore bundled agent executable bits
        if: runner.os != 'Windows'
        run: chmod +x crates/oxideterm-gpui-app/resources/agents/oxideterm-agent-*

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          # GitHub's Ubuntu 22.04 image can preinstall LLVM libunwind-*-dev
          # packages. They conflict with libunwind-dev, which GStreamer dev
          # packages require, so remove the LLVM dev variants before apt solves.
          sudo apt-get remove -y \
            libunwind-14-dev \
            libunwind-15-dev \
            libunwind-16-dev \
            libunwind-17-dev \
            libunwind-18-dev || true
          sudo apt-get install -y \
            build-essential \
            curl \
            file \
            libasound2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libgstreamer-plugins-base1.0-dev \
            libgstreamer1.0-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libssl-dev \
            libsoup-3.0-dev \
            libunwind-dev \
            libwebkit2gtk-4.1-dev \
            libx11-dev \
            libxcb-cursor-dev \
            libxcb-icccm4-dev \
            libxcb-image0-dev \
            libxcb-keysyms1-dev \
            libxcb-randr0-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxcb-xinerama0-dev \
            libxkbcommon-dev \
            libxkbcommon-x11-dev \
            mesa-vulkan-drivers \
            patchelf \
            pkg-config

      - name: Validate manual release input
        if: github.event_name == 'workflow_dispatch' && inputs.upload_release && inputs.version == ''
        run: python -c "import sys; print('Manual release upload requires the version input.', file=sys.stderr); sys.exit(1)"

      - name: Package native app
        env:
          OXIDETERM_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
        run: python scripts/package_native.py ${{ matrix.target }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OxideTerm-${{ matrix.label }}
          path: |
            dist/*.app.zip
            dist/*.dmg
            dist/*.tar.gz
            dist/*.zip
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
      prerelease: ${{ steps.release_meta.outputs.prerelease }}
    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: OxideTerm-*
          path: dist-release
          merge-multiple: true

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="native-v${INPUT_VERSION}"
          fi

          version="${tag#native-v}"
          version="${version#gpui-v}"
          version="${version#v}"

          prerelease=false
          if [[ "${tag}" == native-v* || "${tag}" == gpui-v* || "${version}" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Sign release assets
        shell: bash
        env:
          MINISIGN_PRIVATE_KEY_B64: ${{ secrets.MINISIGN_PRIVATE_KEY_B64 }}
          MINISIGN_PASSWORD: ${{ secrets.MINISIGN_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail
          signing_key_b64="${MINISIGN_PRIVATE_KEY_B64:-${TAURI_SIGNING_PRIVATE_KEY:-}}"
          signing_password="${MINISIGN_PASSWORD:-${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}}"

          if [[ -z "${signing_key_b64}" ]]; then
            echo "MINISIGN_PRIVATE_KEY_B64 or TAURI_SIGNING_PRIVATE_KEY is required for native updater releases." >&2
            exit 1
          fi

          sudo apt-get update
          sudo apt-get install -y minisign

          key_path="$(mktemp)"
          trap 'rm -f "${key_path}"' EXIT
          printf '%s' "${signing_key_b64}" | base64 --decode > "${key_path}"
          chmod 600 "${key_path}"

          # Native and Tauri channel updaters both reject unsigned assets.
          mapfile -t assets < <(find dist-release -maxdepth 1 -type f \( \
            -name '*.app.zip' -o \
            -name '*.dmg' -o \
            -name '*.tar.gz' -o \
            -name '*.zip' \
          \) | sort -u)

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No native release assets found to sign." >&2
            exit 1
          fi

          for asset in "${assets[@]}"; do
            sig="${asset}.sig"
            trusted_comment="OxideTerm ${VERSION} $(basename "${asset}")"
            if [[ -n "${signing_password:-}" ]]; then
              printf '%s\n' "${signing_password}" \
                | minisign -S -s "${key_path}" -m "${asset}" -x "${sig}" -t "${trusted_comment}"
            else
              minisign -S -W -s "${key_path}" -m "${asset}" -x "${sig}" -t "${trusted_comment}"
            fi
          done

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/*.app.zip
            dist-release/*.dmg
            dist-release/*.tar.gz
            dist-release/*.zip
            dist-release/*.sig
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: OxideTerm Native ${{ steps.release_meta.outputs.version }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.prerelease == 'false' }}

  publish-updater:
    name: Generate updater manifest
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const assets = new Map(release.assets.map((asset) => [asset.name, asset]));
            const platforms = {};

            async function addAsset(keys, assetName) {
              const binaryAsset = assets.get(assetName);
              const sigAsset = assets.get(`${assetName}.sig`);
              if (!binaryAsset || !sigAsset) {
                core.warning(`Skipping ${assetName}: missing binary or signature asset`);
                return;
              }

              const sigResponse = await fetch(sigAsset.browser_download_url);
              if (!sigResponse.ok) {
                throw new Error(`failed to download ${sigAsset.name}: HTTP ${sigResponse.status}`);
              }

              // The updater manifest stores base64-encoded minisign text, matching
              // Tauri's update_manager.rs and the native oxideterm-update crate.
              const signatureText = (await sigResponse.text()).trim();
              const signature = Buffer.from(signatureText, 'utf8').toString('base64');
              for (const key of keys) {
                platforms[key] = {
                  signature,
                  url: binaryAsset.browser_download_url,
                };
              }
            }

            await addAsset(
              ['darwin-aarch64', 'darwin-aarch64-app', 'macos-aarch64', 'aarch64-apple-darwin'],
              `OxideTerm_${version}_macos_arm64.app.zip`,
            );
            await addAsset(
              ['darwin-x86_64', 'darwin-x86_64-app', 'macos-x86_64', 'x86_64-apple-darwin'],
              `OxideTerm_${version}_macos_x64.app.zip`,
            );
            await addAsset(
              ['linux-aarch64', 'aarch64-unknown-linux-gnu'],
              `OxideTerm_${version}_linux_arm64_portable.tar.gz`,
            );
            await addAsset(
              ['linux-x86_64', 'x86_64-unknown-linux-gnu'],
              `OxideTerm_${version}_linux_x64_portable.tar.gz`,
            );
            await addAsset(
              ['windows-aarch64', 'aarch64-pc-windows-msvc'],
              `OxideTerm_${version}_windows_arm64_portable.zip`,
            );
            await addAsset(
              ['windows-x86_64', 'x86_64-pc-windows-msvc'],
              `OxideTerm_${version}_windows_x64_portable.zip`,
            );

            if (Object.keys(platforms).length === 0) {
              throw new Error('latest.json would contain no updater platforms');
            }

            const latestJson = {
              version,
              notes: release.body || '',
              pub_date: release.published_at || new Date().toISOString(),
              platforms,
            };

            const existing = release.assets.find((asset) => asset.name === 'latest.json');
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            const content = JSON.stringify(latestJson, null, 2);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            core.info(`Uploaded latest.json for ${tag} with ${Object.keys(platforms).length} platform key(s).`);

  publish-gpui-preview-updater:
    name: Publish GPUI preview updater manifest
    needs:
      - release
      - publish-updater
    runs-on: ubuntu-latest
    if: needs.release.outputs.prerelease == 'true' && (startsWith(needs.release.outputs.tag, 'gpui-v') || contains(needs.release.outputs.version, 'gpui-preview') || contains(needs.release.outputs.version, 'native-preview') || contains(needs.release.outputs.version, 'rustnative-preview'))
    permissions:
      contents: write
    steps:
      - name: Upload latest.json to updater-gpui-preview release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        with:
          script: |
            const sourceTag = process.env.RELEASE_TAG;
            const channelTag = 'updater-gpui-preview';

            const { data: sourceRelease } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: sourceTag,
            });

            const latestAsset = sourceRelease.assets.find((asset) => asset.name === 'latest.json');
            if (!latestAsset) {
              throw new Error(`No latest.json found on ${sourceTag}`);
            }

            const manifestResponse = await fetch(latestAsset.browser_download_url);
            if (!manifestResponse.ok) {
              throw new Error(`failed to download latest.json: HTTP ${manifestResponse.status}`);
            }
            const content = await manifestResponse.text();

            let channelRelease;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: channelTag,
              });
              channelRelease = data;
            } catch (error) {
              if (error.status !== 404) throw error;
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: channelTag,
                name: 'GPUI Preview Updater Manifest',
                body: 'This release hosts latest.json for the GPUI preview update channel. Do not delete.',
                prerelease: true,
                draft: false,
              });
              channelRelease = data;
            }

            const existing = channelRelease.assets.find((asset) => asset.name === 'latest.json');
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: channelRelease.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            core.info(`Uploaded ${sourceTag} latest.json to ${channelTag}.`);

  cleanup-sigs:
    name: Remove signature helper assets
    needs:
      - release
      - publish-updater
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    steps:
      - name: Delete .sig assets from release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            const sigAssets = release.assets.filter((asset) => asset.name.endsWith('.sig'));
            for (const asset of sigAssets) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
            core.info(`Deleted ${sigAssets.length} signature helper asset(s).`);
