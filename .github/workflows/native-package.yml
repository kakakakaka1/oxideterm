name: Native Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional artifact version override, for example 0.1.0-preview.1'
        required: false
        type: string
      upload_release:
        description: 'Upload artifacts to the current tag release'
        required: false
        default: false
        type: boolean
  push:
    tags:
      - 'v*'
      - 'native-v*'
      - 'gpui-v*'

permissions:
  contents: read

concurrency:
  group: native-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Six-platform matrix (macOS / Linux / Windows, arm64 + x64) ─────────
  package:
    name: Package ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-arm64
            os: macos-14
            target: aarch64-apple-darwin
          - label: macos-x64
            # Use an Intel runner so Cargo build scripts run on the same host
            # architecture as the x86_64 release target.
            os: macos-15-intel
            target: x86_64-apple-darwin
          - label: linux-x64
            os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
          - label: linux-arm64
            os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
          - label: windows-x64
            os: windows-latest
            target: x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-latest
            target: aarch64-pc-windows-msvc

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate manual release input
        if: github.event_name == 'workflow_dispatch' && inputs.upload_release && inputs.version == ''
        run: python3 -c "import sys; print('Manual release upload requires the version input.', file=sys.stderr); sys.exit(1)"

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          key: native-package-${{ matrix.target }}
          cache-on-failure: false

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        uses: ./.github/actions/install-linux-deps
        with:
          extra_packages: 'curl file patchelf desktop-file-utils'

      - name: Install Linux AppImage tooling
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.target }}" in
            x86_64-unknown-linux-gnu) appimage_arch="x86_64" ;;
            aarch64-unknown-linux-gnu) appimage_arch="aarch64" ;;
            *) echo "Unsupported AppImage target: ${{ matrix.target }}" >&2; exit 1 ;;
          esac
          curl -L --retry 3 \
            -o appimagetool \
            "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-${appimage_arch}.AppImage"
          chmod +x appimagetool
          sudo mv appimagetool /usr/local/bin/appimagetool

      - name: Install Windows system dependencies
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install nsis -y --no-progress

      - name: Package native app
        env:
          OXIDETERM_VERSION: ${{ github.ref_type == 'tag' && github.ref_name || inputs.version }}
          APPIMAGE_EXTRACT_AND_RUN: ${{ runner.os == 'Linux' && '1' || '' }}
        run: python scripts/package_native.py ${{ matrix.target }}

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: OxideTerm-${{ matrix.label }}
          path: |
            dist/*.app.zip
            dist/*.dmg
            dist/*.tar.gz
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: error

  release:
    name: Publish release assets
    needs: package
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.release_meta.outputs.tag }}
      version: ${{ steps.release_meta.outputs.version }}
      prerelease: ${{ steps.release_meta.outputs.prerelease }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: OxideTerm-*
          path: dist-release
          merge-multiple: true

      - name: Resolve release metadata
        id: release_meta
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="native-v${INPUT_VERSION}"
          fi

          version="${tag#native-v}"
          version="${version#gpui-v}"
          version="${version#v}"

          prerelease=false
          if [[ "${tag}" == native-v* || "${tag}" == gpui-v* || "${version}" == *-* ]]; then
            prerelease=true
          fi

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "prerelease=${prerelease}" >> "${GITHUB_OUTPUT}"

      - name: Resolve release notes
        id: release_notes
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail

          # GPUI preview releases use stable evergreen notes so the release page
          # and updater manifest carry the same warning and installation tips.
          if [[ "${RELEASE_TAG}" == gpui-v* || "${RELEASE_VERSION}" == *gpui-preview* || "${RELEASE_VERSION}" == *native-preview* || "${RELEASE_VERSION}" == *rustnative-preview* ]]; then
            cp .github/release-notes/gpui-preview.md release-notes.md
            echo "generate_release_notes=false" >> "${GITHUB_OUTPUT}"
          else
            printf '%s\n' 'Native package release generated by the OxideTerm release workflow.' > release-notes.md
            echo "generate_release_notes=true" >> "${GITHUB_OUTPUT}"
          fi
          echo "body_path=release-notes.md" >> "${GITHUB_OUTPUT}"

      - name: Sign release assets
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          VERSION: ${{ steps.release_meta.outputs.version }}
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y minisign

          key_path="$(mktemp)"
          trap 'rm -f "${key_path}"' EXIT
          printf '%s' "${TAURI_SIGNING_PRIVATE_KEY}" | base64 --decode > "${key_path}"
          chmod 600 "${key_path}"

          # Native and Tauri channel updaters both reject unsigned assets.
          mapfile -t assets < <(find dist-release -maxdepth 1 -type f \( \
            -name '*.app.zip' -o \
            -name '*.dmg' -o \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
          \) | sort -u)

          if [[ "${#assets[@]}" -eq 0 ]]; then
            echo "No native release assets found to sign." >&2
            exit 1
          fi

          for asset in "${assets[@]}"; do
            sig="${asset}.sig"
            trusted_comment="OxideTerm ${VERSION} $(basename "${asset}")"
            if [[ -n "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD:-}" ]]; then
              printf '%s\n' "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" \
                | minisign -S -s "${key_path}" -m "${asset}" -x "${sig}" -t "${trusted_comment}"
            else
              minisign -S -W -s "${key_path}" -m "${asset}" -x "${sig}" -t "${trusted_comment}"
            fi
          done

      - name: Generate release checksums
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t checksum_assets < <(find dist-release -maxdepth 1 -type f \( \
            -name '*.app.zip' -o \
            -name '*.dmg' -o \
            -name '*.tar.gz' -o \
            -name '*.zip' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' \
          \) | sort -u)

          if [[ "${#checksum_assets[@]}" -eq 0 ]]; then
            echo "No native release assets found for checksum generation." >&2
            exit 1
          fi

          (cd dist-release && sha256sum "${checksum_assets[@]/#dist-release\//}" > sha256sums.txt)

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-release/*.app.zip
            dist-release/*.dmg
            dist-release/*.tar.gz
            dist-release/*.zip
            dist-release/*.exe
            dist-release/*.AppImage
            dist-release/*.deb
            dist-release/*.sig
            dist-release/sha256sums.txt
          tag_name: ${{ steps.release_meta.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: OxideTerm Native ${{ steps.release_meta.outputs.version }}
          prerelease: ${{ steps.release_meta.outputs.prerelease }}
          make_latest: ${{ steps.release_meta.outputs.prerelease == 'false' }}
          body_path: ${{ steps.release_notes.outputs.body_path }}
          generate_release_notes: ${{ steps.release_notes.outputs.generate_release_notes }}

  publish-updater:
    name: Generate updater manifest
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    steps:
      - name: Build and upload latest.json
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const assets = new Map(release.assets.map((asset) => [asset.name, asset]));
            const platforms = {};

            async function addAsset(keys, assetName) {
              const binaryAsset = assets.get(assetName);
              const sigAsset = assets.get(`${assetName}.sig`);
              if (!binaryAsset || !sigAsset) {
                core.warning(`Skipping ${assetName}: missing binary or signature asset`);
                return;
              }

              const sigResponse = await fetch(sigAsset.browser_download_url);
              if (!sigResponse.ok) {
                throw new Error(`failed to download ${sigAsset.name}: HTTP ${sigResponse.status}`);
              }

              // The updater manifest stores base64-encoded minisign text, matching
              // Tauri's update_manager.rs and the native oxideterm-update crate.
              const signatureText = (await sigResponse.text()).trim();
              const signature = Buffer.from(signatureText, 'utf8').toString('base64');
              for (const key of keys) {
                platforms[key] = {
                  signature,
                  url: binaryAsset.browser_download_url,
                };
              }
            }

            await addAsset(
              ['darwin-aarch64', 'darwin-aarch64-app', 'macos-aarch64', 'aarch64-apple-darwin'],
              `OxideTerm_${version}_macos_arm64.app.zip`,
            );
            await addAsset(
              ['darwin-x86_64', 'darwin-x86_64-app', 'macos-x86_64', 'x86_64-apple-darwin'],
              `OxideTerm_${version}_macos_x64.app.zip`,
            );
            await addAsset(
              ['linux-aarch64', 'linux-aarch64-appimage', 'aarch64-unknown-linux-gnu'],
              `OxideTerm_${version}_linux_arm64.AppImage`,
            );
            await addAsset(
              ['linux-x86_64', 'linux-x86_64-appimage', 'x86_64-unknown-linux-gnu'],
              `OxideTerm_${version}_linux_x64.AppImage`,
            );
            await addAsset(
              ['linux-aarch64-portable'],
              `OxideTerm_${version}_linux_arm64_portable.tar.gz`,
            );
            await addAsset(
              ['linux-x86_64-portable'],
              `OxideTerm_${version}_linux_x64_portable.tar.gz`,
            );
            await addAsset(
              ['linux-aarch64-deb'],
              `OxideTerm_${version}_linux_arm64.deb`,
            );
            await addAsset(
              ['linux-x86_64-deb'],
              `OxideTerm_${version}_linux_x64.deb`,
            );
            await addAsset(
              ['windows-aarch64', 'aarch64-pc-windows-msvc'],
              `OxideTerm_${version}_windows_arm64-setup.exe`,
            );
            await addAsset(
              ['windows-aarch64-portable'],
              `OxideTerm_${version}_windows_arm64_portable.zip`,
            );
            await addAsset(
              ['windows-x86_64', 'x86_64-pc-windows-msvc'],
              `OxideTerm_${version}_windows_x64-setup.exe`,
            );
            await addAsset(
              ['windows-x86_64-portable'],
              `OxideTerm_${version}_windows_x64_portable.zip`,
            );

            if (Object.keys(platforms).length === 0) {
              throw new Error('latest.json would contain no updater platforms');
            }

            const latestJson = {
              version,
              notes: release.body || '',
              pub_date: release.published_at || new Date().toISOString(),
              platforms,
            };

            const existing = release.assets.find((asset) => asset.name === 'latest.json');
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            const content = JSON.stringify(latestJson, null, 2);
            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            core.info(`Uploaded latest.json for ${tag} with ${Object.keys(platforms).length} platform key(s).`);

  publish-gpui-preview-updater:
    name: Publish GPUI preview updater manifest
    needs:
      - release
      - publish-updater
    runs-on: ubuntu-latest
    if: needs.release.outputs.prerelease == 'true' && (startsWith(needs.release.outputs.tag, 'gpui-v') || contains(needs.release.outputs.version, 'gpui-preview') || contains(needs.release.outputs.version, 'native-preview') || contains(needs.release.outputs.version, 'rustnative-preview'))
    permissions:
      contents: write
    steps:
      - name: Upload latest.json to updater-gpui-preview release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        with:
          script: |
            const sourceTag = process.env.RELEASE_TAG;
            const channelTag = 'updater-gpui-preview';

            const { data: sourceRelease } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: sourceTag,
            });

            const latestAsset = sourceRelease.assets.find((asset) => asset.name === 'latest.json');
            if (!latestAsset) {
              throw new Error(`No latest.json found on ${sourceTag}`);
            }

            const manifestResponse = await fetch(latestAsset.browser_download_url);
            if (!manifestResponse.ok) {
              throw new Error(`failed to download latest.json: HTTP ${manifestResponse.status}`);
            }
            const content = await manifestResponse.text();

            let channelRelease;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: channelTag,
              });
              channelRelease = data;
            } catch (error) {
              if (error.status !== 404) throw error;
              const { data } = await github.rest.repos.createRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag_name: channelTag,
                name: 'GPUI Preview Updater Manifest',
                body: 'This release hosts latest.json for the GPUI preview update channel. Do not delete.',
                prerelease: true,
                draft: false,
              });
              channelRelease = data;
            }

            const existing = channelRelease.assets.find((asset) => asset.name === 'latest.json');
            if (existing) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: existing.id,
              });
            }

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: channelRelease.id,
              name: 'latest.json',
              data: content,
              headers: {
                'content-type': 'application/json',
                'content-length': Buffer.byteLength(content),
              },
            });

            core.info(`Uploaded ${sourceTag} latest.json to ${channelTag}.`);

  cleanup-sigs:
    name: Remove signature helper assets
    needs:
      - release
      - publish-updater
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: write
    steps:
      - name: Delete .sig assets from release
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });
            const sigAssets = release.assets.filter((asset) => asset.name.endsWith('.sig'));
            for (const asset of sigAssets) {
              await github.rest.repos.deleteReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                asset_id: asset.id,
              });
            }
            core.info(`Deleted ${sigAssets.length} signature helper asset(s).`);

  validate-release-assets:
    name: Validate release assets
    needs:
      - release
      - publish-updater
      - cleanup-sigs
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.upload_release)
    permissions:
      contents: read
    steps:
      - name: Check final release asset set
        uses: actions/github-script@v7
        env:
          RELEASE_TAG: ${{ needs.release.outputs.tag }}
          RELEASE_VERSION: ${{ needs.release.outputs.version }}
        with:
          script: |
            const tag = process.env.RELEASE_TAG;
            const version = process.env.RELEASE_VERSION;

            const { data: release } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag,
            });

            const names = new Set(release.assets.map((asset) => asset.name));
            const isGpuiPreview = tag.startsWith('gpui-v')
              || version.includes('gpui-preview')
              || version.includes('native-preview')
              || version.includes('rustnative-preview');
            if (isGpuiPreview && !(release.body || '').includes('do not download this preview yet')) {
              throw new Error(`Release ${tag} is missing the GPUI preview release-note warning`);
            }

            const expected = [
              'latest.json',
              'sha256sums.txt',
              `OxideTerm_${version}_macos_arm64.app.zip`,
              `OxideTerm_${version}_macos_arm64.dmg`,
              `OxideTerm_${version}_macos_arm64_portable.tar.gz`,
              `OxideTerm_${version}_macos_x64.app.zip`,
              `OxideTerm_${version}_macos_x64.dmg`,
              `OxideTerm_${version}_macos_x64_portable.tar.gz`,
              `OxideTerm_${version}_linux_arm64.AppImage`,
              `OxideTerm_${version}_linux_arm64.deb`,
              `OxideTerm_${version}_linux_arm64_portable.tar.gz`,
              `OxideTerm_${version}_linux_x64.AppImage`,
              `OxideTerm_${version}_linux_x64.deb`,
              `OxideTerm_${version}_linux_x64_portable.tar.gz`,
              `OxideTerm_${version}_windows_arm64-setup.exe`,
              `OxideTerm_${version}_windows_arm64_portable.zip`,
              `OxideTerm_${version}_windows_x64-setup.exe`,
              `OxideTerm_${version}_windows_x64_portable.zip`,
            ];

            const missing = expected.filter((name) => !names.has(name));
            if (missing.length > 0) {
              throw new Error(`Release ${tag} is missing asset(s): ${missing.join(', ')}`);
            }

            const leakedSigs = [...names].filter((name) => name.endsWith('.sig'));
            if (leakedSigs.length > 0) {
              throw new Error(`Release ${tag} still exposes signature helper asset(s): ${leakedSigs.join(', ')}`);
            }

            const checksumAsset = release.assets.find((asset) => asset.name === 'sha256sums.txt');
            const response = await fetch(checksumAsset.browser_download_url);
            if (!response.ok) {
              throw new Error(`failed to download sha256sums.txt: HTTP ${response.status}`);
            }
            const checksumText = await response.text();
            const checksumMissing = expected
              .filter((name) => name !== 'latest.json' && name !== 'sha256sums.txt')
              .filter((name) => !checksumText.includes(`  ${name}`));
            if (checksumMissing.length > 0) {
              throw new Error(`sha256sums.txt is missing asset checksum(s): ${checksumMissing.join(', ')}`);
            }

            core.info(`Validated ${expected.length} release asset(s) for ${tag}.`);
