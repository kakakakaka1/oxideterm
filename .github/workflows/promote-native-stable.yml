name: Promote Native Stable

on:
  workflow_dispatch:
    inputs:
      source_tag:
        description: 'Validated stable release tag, for example v2.0.0'
        required: true
        type: string

permissions:
  contents: read

jobs:
  promote:
    name: Promote stable GitHub release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Validate and promote stable release
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        env:
          SOURCE_TAG: ${{ inputs.source_tag }}
        with:
          script: |
            const sourceTag = process.env.SOURCE_TAG;
            if (!/^v\d+\.\d+\.\d+$/.test(sourceTag)) {
              throw new Error(`Stable promotion requires a final vX.Y.Z tag: ${sourceTag}`);
            }

            const { data: sourceRelease } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: sourceTag,
            });
            if (sourceRelease.draft || sourceRelease.prerelease) {
              throw new Error(`${sourceTag} must be a published non-prerelease release`);
            }

            const manifestAsset = sourceRelease.assets.find((asset) => asset.name === 'latest.json');
            if (!manifestAsset) {
              throw new Error(`${sourceTag} does not contain latest.json`);
            }
            const manifestResponse = await fetch(manifestAsset.browser_download_url);
            if (!manifestResponse.ok) {
              throw new Error(`failed to download ${sourceTag} latest.json: HTTP ${manifestResponse.status}`);
            }
            const manifestText = await manifestResponse.text();
            const manifest = JSON.parse(manifestText);
            const expectedVersion = sourceTag.slice(1);
            if (manifest.version !== expectedVersion) {
              throw new Error(`manifest version ${manifest.version} does not match ${expectedVersion}`);
            }
            const requiredPlatforms = [
              'darwin-aarch64',
              'darwin-x86_64',
              'macos-aarch64-app',
              'macos-aarch64-portable',
              'macos-x86_64-app',
              'macos-x86_64-portable',
              'linux-aarch64-appimage',
              'linux-aarch64-deb',
              'linux-aarch64-portable',
              'linux-x86_64-appimage',
              'linux-x86_64-deb',
              'linux-x86_64-portable',
              'windows-aarch64-nsis',
              'windows-aarch64-portable',
              'windows-x86_64-nsis',
              'windows-x86_64-portable',
            ];
            for (const platform of requiredPlatforms) {
              const entry = manifest.platforms?.[platform];
              if (!entry?.url || !entry?.signature) {
                throw new Error(`manifest is missing complete ${platform} updater metadata`);
              }
              if (!entry.url.includes(`/releases/download/${sourceTag}/`)) {
                throw new Error(`${platform} does not reference an asset from ${sourceTag}`);
              }
            }
            if (!manifest.platforms['darwin-aarch64'].url.endsWith('.app.tar.gz')
                || !manifest.platforms['darwin-x86_64'].url.endsWith('.app.tar.gz')) {
              throw new Error('stable manifest legacy macOS keys must use Tauri app.tar.gz assets');
            }

            // `updater-stable` is intentionally frozen for old GPUI preview
            // builds. Tauri 1.x and native stable releases both consume the
            // validated manifest from GitHub's Latest release instead.
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: sourceRelease.id,
              make_latest: 'true',
            });

            core.info(`Promoted ${sourceTag} to GitHub latest; updater-stable remains frozen.`);
