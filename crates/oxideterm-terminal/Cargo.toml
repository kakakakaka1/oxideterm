[package]
name = "oxideterm-terminal"
edition.workspace = true
license.workspace = true
version.workspace = true

[dependencies]
alacritty_terminal.workspace = true
anyhow.workspace = true
crossbeam-channel.workspace = true
libc.workspace = true
native-tls = "0.2"
oxideterm-ssh = { path = "../oxideterm-ssh" }
oxideterm-modem-transfer = { path = "../oxideterm-modem-transfer" }
oxideterm-terminal-encoding = { path = "../oxideterm-terminal-encoding" }
oxideterm-terminal-graphics = { path = "../oxideterm-terminal-graphics" }
